# SDP (Spark Declarative Pipeline) — medallion (bronze → silver → gold)
# serverless: true — required on workspaces that only allow serverless SDP (e.g. many fedhealth / demo tenants).
resources:
  pipelines:
    va_claims_medallion:
      name: va_claims_medallion_${bundle.target}
      catalog: ${var.catalog}
      target: ${var.schema}
      development: true
      serverless: true
      libraries:
        - notebook:
            path: ../notebooks/dlt_va_claims.py
      configuration:
        bundle.catalog: ${var.catalog}
        bundle.schema: ${var.schema}
